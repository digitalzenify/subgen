services:
   subgen:
      container_name: subgen
      tty: true
      image: ghcr.io/digitalzenify/subgen:latest
      environment:
         # Groq API Configuration (REQUIRED)
         - "GROQ_API_KEY=your_api_key_here"            # Required. Get from console.groq.com
         - "GROQ_MODEL=whisper-large-v3-turbo"        # Options: whisper-large-v3, whisper-large-v3-turbo
         - "GROQ_MAX_CHUNK_SIZE_MB=20"                # Max chunk size (must be under 25MB for free tier)
         - "GROQ_RETRY_ATTEMPTS=3"                    # Retries on rate limit / transient errors
         - "GROQ_RETRY_DELAY=5"                       # Initial retry delay in seconds (exponential backoff)
         # Subtitle Configuration
         - "SUBTITLE_TAG="                            # Optional tag in filename, e.g. "groq" -> Movie.en.groq.srt
         - "SUBTITLE_LANGUAGE_NAME="                  # Override subtitle language name (legacy: NAMESUBLANG)
         # Media Server Integration
         - "PLEXTOKEN=plextoken"
         - "PLEXSERVER=http://plexserver:32400"
         - "JELLYFINTOKEN=token here"
         - "JELLYFINSERVER=http://jellyfin:8096"
         # Processing Control
         - "PROCADDEDMEDIA=True"
         - "PROCMEDIAONPLAY=False"
         - "SKIPIFINTERNALSUBLANG=eng"
         - "WEBHOOKPORT=9000"
         - "CONCURRENT_TRANSCRIPTIONS=2"
         - "DEBUG=True"
         # Path Mapping
         - "USE_PATH_MAPPING=False"
         - "PATH_MAPPING_FROM=/tv"
         - "PATH_MAPPING_TO=/Volumes/TV"
         # Other
         - "APPEND=False"
         - "LRC_FOR_AUDIO_FILES=True"
      volumes:
         - "${TV}:/tv"
         - "${MOVIES}:/movies"
      ports:
         - "9000:9000"
